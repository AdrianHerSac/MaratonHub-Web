<div class="min-h-screen pt-8 pb-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-7xl mx-auto">
        <div class="mb-8 mt-6">
            <h1 class="text-4xl font-bold text-white mb-2">Mi Lista</h1>
            <p class="text-gray-400 text-lg">Películas y series que has valorado</p>
        </div>

        <!-- Estado de Carga -->
        <div *ngIf="isLoading" class="flex justify-center items-center py-20">
            <div class="spinner"></div>
        </div>

        <!-- Estado Vacío -->
        <div *ngIf="!isLoading && ratedItems.length === 0" class="text-center py-20 bg-gray-800/50 rounded-2xl border border-gray-700/50 backdrop-blur-sm">
            <svg class="mx-auto h-16 w-16 text-gray-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path>
            </svg>
            <h3 class="text-xl font-medium text-white mb-2">Aún no has valorado nada</h3>
            <p class="text-gray-400 mb-6">Explora películas y series para dejar tu opinión</p>
            <a routerLink="/inicio" class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-full shadow-sm text-white bg-purple-600 hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 transition-colors">
                Explorar catálogo
            </a>
        </div>

        <!-- Grid de Contenido -->
        <div *ngIf="!isLoading && ratedItems.length > 0" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">
            <div *ngFor="let item of ratedItems" 
                 class="bg-gray-800/80 rounded-xl border border-gray-700/50 overflow-hidden hover:border-purple-500/50 transition-all duration-300 group cursor-pointer"
                 [routerLink]="['/', item.review.mediaType === 'Movie' ? 'movie' : 'tv', item.review.mediaId]">
                <div class="relative aspect-[2/3] overflow-hidden">
                    <img [src]="item.posterUrl" [alt]="item.title" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                    <div class="absolute inset-0 bg-gradient-to-t from-gray-900 via-gray-900/40 to-transparent opacity-80"></div>
                    
                    <div class="absolute bottom-0 left-0 right-0 p-4">
                        <h3 class="text-sm font-bold text-white mb-1 line-clamp-1 truncate">{{ item.title }}</h3>
                        <div class="flex items-center gap-2 mb-2">
                            <div class="flex items-center bg-purple-600/90 backdrop-blur px-2 py-1 rounded-md">
                                <span class="text-white font-bold text-xs">★ {{ item.review.rating }}/10</span>
                            </div>
                        </div>
                        <p class="text-xs text-gray-300 line-clamp-2 truncate max-h-[3rem] text-ellipsis overflow-hidden break-words whitespace-normal" title="{{ item.review.comment }}">
                            "{{ item.review.comment }}"
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
