<nav class="glass-nav w-full top-0 z-50 shadow-lg">
    <div class="max-w-7xl">
        <div class="flex h-16">

            <div class="flex space-x-4 gap-3">
                <a routerLink="/inicio" class="flex items-center space-x-2 group cursor-pointer">
                    <span class="text-2xl font-bold logo-gradient hidden lg:block">MaratonHub</span>
                </a>
                <!-- Desktop Navigation -->
                <div class="hidden md:flex items-center space-x-1 lg:space-x-4">
                  <a routerLink="/inicio" routerLinkActive="nav-link-active" [routerLinkActiveOptions]="{exact: true}"
                     class="nav-link text-gray-300 hover:text-white px-2 lg:px-3 py-2 text-sm font-medium cursor-pointer">
                    Inicio
                  </a>
                  <a routerLink="/movies" routerLinkActive="nav-link-active"
                     class="nav-link text-gray-300 hover:text-white px-2 lg:px-3 py-2 text-sm font-medium cursor-pointer">
                    Películas
                  </a>
                  <a routerLink="/tv" routerLinkActive="nav-link-active"
                     class="nav-link text-gray-300 hover:text-white px-2 lg:px-3 py-2 text-sm font-medium whitespace-nowrap cursor-pointer">
                     Series
                  </a>
                  <a routerLink="/top-rated" routerLinkActive="nav-link-active"
                     class="nav-link text-gray-300 hover:text-white px-2 lg:px-3 py-2 text-sm font-medium whitespace-nowrap cursor-pointer">
                     Top Rated
                  </a>
                  <a routerLink="/mi-lista" routerLinkActive="nav-link-active"
                     class="nav-link text-gray-300 hover:text-white px-2 lg:px-3 py-2 text-sm font-medium whitespace-nowrap cursor-pointer">
                     Mi Lista
                  </a>
                </div>
            </div>

            <div class="hidden md:flex items-center gap-3">
                <!-- Search -->
                <div class="relative group">
                    <input type="text" placeholder="Buscar películas, series..." [(ngModel)]="searchQuery"
                        (keypress)="onSearchKeyPress($event)"
                        class="search-input bg-gray-800 text-gray-300 rounded-full pl-10 pr-10 py-2 focus:w-80 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all duration-300 placeholder-gray-500">
                    <svg class="search-icon absolute left-3 w-5 h-5 text-gray-500 transition-all duration-300 pointer-events-none"
                        fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                    <button *ngIf="searchQuery" (click)="clearSearch()"
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>

                <div class="relative">
                    <button (click)="toggleNotificationsPanel()"
                        class="relative p-2 text-gray-400 hover:text-white transition-colors duration-300 hover:bg-gray-800 rounded-full">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
                            </path>
                        </svg>
                        <span *ngIf="unreadNotificationsCount > 0"
                            class="absolute top-1 right-1 w-5 h-5 bg-pink-500 rounded-full text-white text-xs flex items-center justify-center font-bold">
                            {{unreadNotificationsCount}}
                        </span>
                    </button>

                    <div *ngIf="isNotificationsPanelOpen"
                        class="absolute right-0 mt-2 w-80 bg-gray-800 rounded-lg shadow-xl border border-gray-700 max-h-96 overflow-hidden">
                        <div class="p-4 border-b border-gray-700 flex items-center justify-between">
                            <h3 class="text-white font-semibold">Notificaciones</h3>
                            <button *ngIf="notifications.length > 0" (click)="markAllAsRead()"
                                class="text-xs text-purple-400 hover:text-purple-300">
                                Marcar todas como leídas
                            </button>
                        </div>
                        <div class="overflow-y-auto max-h-80">
                            <div *ngFor="let notif of notifications" (click)="markAsRead(notif)"
                                class="p-4 border-b border-gray-700 hover:bg-gray-700 transition-colors cursor-pointer"
                                [class.bg-gray-750]="!notif.read">
                                <div class="flex items-start justify-between">
                                    <div class="flex-1">
                                        <div class="flex items-center gap-2">
                                            <h4 class="text-sm font-semibold text-white">{{notif.title}}</h4>
                                            <span *ngIf="!notif.read" class="w-2 h-2 bg-purple-500 rounded-full"></span>
                                        </div>
                                        <p class="text-xs text-gray-400 mt-1">{{notif.message}}</p>
                                        <span class="text-xs text-gray-500 mt-1 inline-block">{{notif.time}}</span>
                                    </div>
                                    <button (click)="deleteNotification(notif.id); $event.stopPropagation()"
                                        class="text-gray-500 hover:text-red-400 ml-2">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M6 18L18 6M6 6l12 12"></path>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            <div *ngIf="notifications.length === 0" class="p-8 text-center text-gray-500">
                                <svg class="w-12 h-12 mx-auto mb-2 opacity-50" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4">
                                    </path>
                                </svg>
                                <p>No hay notificaciones</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="relative">
                    @if(authService.isLoggedIn()){
                      <button (click)="toggleUserDropdown()"
                          class="flex items-center space-x-2 p-2 rounded-full hover:bg-gray-800 transition-colors duration-300">
                          <div
                              class="w-8 h-8 rounded-full bg-gradient-to-br from-amber-500 to-pink-500 flex items-center justify-center text-white font-semibold uppercase">
                              {{authService.currentUser()?.username?.[0] || 'U'}}
                          </div>
                          <span class="text-white hidden sm:block">{{ authService.currentUser()?.username }}</span>
                          <svg class="w-4 h-4 text-gray-400 transition-transform" [class.rotate-180]="isUserDropdownOpen"
                              fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7">
                              </path>
                          </svg>
                      </button>

                      <div *ngIf="isUserDropdownOpen"
                          class="absolute right-0 mt-2 w-48 bg-gray-800 rounded-lg shadow-xl py-2 border border-gray-700">
                          <a (click)="goToProfile()"
                              class="block px-4 py-2 text-sm text-gray-300 hover:bg-gray-700 hover:text-white transition-colors duration-200 cursor-pointer">
                              Mi Perfil
                          </a>
                          <a (click)="goToRatings()"
                              class="block px-4 py-2 text-sm text-gray-300 hover:bg-gray-700 hover:text-white transition-colors duration-200 cursor-pointer">
                              Mis Valoraciones
                          </a>
                          <a (click)="goToSettings()"
                              class="block px-4 py-2 text-sm text-gray-300 hover:bg-gray-700 hover:text-white transition-colors duration-200 cursor-pointer">
                              Configuración
                          </a>
                          <hr class="my-2 border-gray-700">
                          <a (click)="logout()"
                              class="block px-4 py-2 text-sm text-red-400 hover:bg-gray-700 hover:text-red-300 transition-colors duration-200 cursor-pointer">
                              Cerrar Sesión
                          </a>
                      </div>
                    } @else {
                      <a routerLink="/login" class="flex items-center space-x-2 px-4 py-2 rounded-full bg-purple-600 hover:bg-purple-700 transition-colors text-white text-sm font-semibold">
                          Iniciar Sesión
                      </a>
                    }
                </div>
            </div>
        </div>
    </div>
</nav>
